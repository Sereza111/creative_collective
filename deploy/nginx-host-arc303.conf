# Добавить на VPS (nginx для бота на 80/443 НЕ трогаем).
#
#   sudo cp deploy/nginx-host-arc303.conf /etc/nginx/sites-available/arc303.conf
#   sudo ln -sf /etc/nginx/sites-available/arc303.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (после того как creative_collective поднят на 127.0.0.1:8081 и :8080):
#   sudo certbot --nginx -d arc303.ru -d api.arc303.ru
#
# Конфликта с ботом нет: у бота свой server_name, здесь только arc303.ru и api.arc303.ru.

server {
    listen 80;
    server_name arc303.ru;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name api.arc303.ru;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
