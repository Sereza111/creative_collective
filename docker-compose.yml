version: '3.8'

services:
  # Node.js API Server - подключается к внешней БД на Beget
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: creative_collective_api:latest
    container_name: creative_collective_api
    restart: unless-stopped
    ports:
      - "8080:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - creative_uploads:/app/uploads
    healthcheck:
      # Liveness: container is up if HTTP server responds on /
      # Readiness (DB connected) is still available at /health
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST:-eskopeboyed.beget.app}
      DB_PORT: 3306
      DB_USER: ${DB_USER:-creative_collective}
      # Secrets must come from your deployment environment / `.env` (do not commit real passwords)
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-creative_collective}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}

  # Minimal landing website + reverse proxy to API
  site:
    build:
      context: ./site
      dockerfile: Dockerfile
    image: creative_collective_site:latest
    container_name: creative_collective_site
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  certbot:
    image: certbot/certbot:v2.11.0
    container_name: creative_collective_certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"

volumes:
  creative_uploads:
    driver: local
  letsencrypt:
    driver: local
  certbot_www:
    driver: local
