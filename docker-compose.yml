version: '3.8'

services:
  # Node.js API Server - подключается к внешней БД на Beget
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: creative_collective_api:latest
    container_name: creative_collective_api
    restart: unless-stopped
    ports:
      - "8080:3000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - creative_uploads:/app/uploads
    healthcheck:
      # Liveness: container is up if HTTP server responds on /
      # Readiness (DB connected) is still available at /health
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: ${DB_HOST:-eskopeboyed.beget.app}
      DB_PORT: 3306
      DB_USER: ${DB_USER:-creative_collective}
      # Secrets must come from your deployment environment / `.env` (do not commit real passwords)
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-creative_collective}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}

  # Public web entrypoint with automatic HTTPS
  web:
    image: caddy:2.9-alpine
    container_name: creative_collective_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./site/index.html:/srv/index.html:ro
      - ./site/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  creative_uploads:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
