version: '3.8'

services:
  # Node.js API Server - подключается к внешней БД на Beget
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: creative_collective_api:latest
    container_name: creative_collective_api
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: eskopeboyed.beget.app
      DB_PORT: 3306
      DB_USER: creative_collective
      # Secrets must come from your deployment environment / `.env` (do not commit real passwords)
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: creative_collective
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGIN: "*"
