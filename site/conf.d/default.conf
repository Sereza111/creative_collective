map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Docker DNS resolver (prevents startup crash if api is not yet resolvable)
resolver 127.0.0.11 ipv6=off valid=10s;

# HTTP-only stable mode (HTTPS is enabled in a separate step after cert issuance)
server {
  listen 80;
  server_name arc303.ru www.arc303.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html =404;
  }
}

server {
  listen 80;
  server_name api.arc303.ru;

  location / {
    set $api_origin http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass $api_origin;
  }
}

