map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream api_upstream {
  server api:3000;
}

# ACME challenge + redirect to HTTPS (arc303.ru)
server {
  listen 80;
  server_name arc303.ru www.arc303.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ACME challenge + redirect to HTTPS (api.arc303.ru)
server {
  listen 80;
  server_name api.arc303.ru;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS: site (arc303.ru)
server {
  listen 443 ssl http2;
  server_name arc303.ru www.arc303.ru;

  ssl_certificate /etc/letsencrypt/live/arc303.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/arc303.ru/privkey.pem;

  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # HSTS (enable after confirming HTTPS works)
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  root /usr/share/nginx/html;
  index index.html;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: expose API via same domain (arc303.ru/api/*)
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://api_upstream;
  }

  location = /health {
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://api_upstream/health;
  }
}

# HTTPS: API (api.arc303.ru)
server {
  listen 443 ssl http2;
  server_name api.arc303.ru;

  ssl_certificate /etc/letsencrypt/live/arc303.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/arc303.ru/privkey.pem;

  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://api_upstream;
  }
}

